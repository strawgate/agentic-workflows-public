name: 'Setup OpenCode environment'
description: 'Sets up OpenCode CLI and environment'
runs:
  using: composite
  steps:
  - name: Download OpenCode
    shell: bash
    run: |
      curl -L -o opencode https://github.com/github/gh-open-code/releases/latest/download/opencode_Linux_x86_64 2>/dev/null || \
      curl -L -o opencode https://github.com/strawgate/gh-open-code/releases/latest/download/opencode_Linux_x86_64 2>/dev/null || \
      git clone https://github.com/github/gh-open-code.git /tmp/gh-open-code && cd /tmp/gh-open-code && go build && cp gh-open-code opencode
      chmod +x opencode
      sudo mv opencode /usr/local/bin/ || mv opencode /usr/local/bin/
      opencode --version

  - name: Setup environment
    shell: bash
    run: |
      echo "OpenCode setup complete"
      echo "ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.minimax.io/anthropic}" >> $GITHUB_ENV