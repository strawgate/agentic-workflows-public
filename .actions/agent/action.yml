name: 'Daily Repository Status Workflow (SideRepoOps)'
description: 'Generates daily repos status reports using OpenCode + MiniMax'
inputs:
  task:
    description: 'Custom task description'
    required: false
    default: 'Create a daily status report for this repository'
runs:
  using: composite
  steps:
  - name: Run agent
    shell: bash
    env:
      GH_TOKEN: ${{ github.token }}
      ANTHROPIC_BASE_URL: https://api.minimax.io/anthropic
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINIMAX_API_KEY }}
    run: |
      echo "🎯 Running OpenCode agent with MiniMax API"
      echo "Task: ${{ inputs.task }}"
      echo "Repository: ${{ github.repository }}"
      
      # Simulate OpenCode (since binary not available yet)
      echo "🧠 AI Agent analyzing repository..."
      
      # Create a simulated daily status issue
      gh issue create \
        --title "[daily-status] Repository Health Report - $(date +%Y-%m-%d)" \
        --body "## Daily Status Report (Simulated)

**Repository:** ${{ github.repository }}
**Generated:** $(date)
**Engine:** OpenCode + MiniMax API

### Repository Analysis
✅ **Status:** Healthy  
✅ **Activity:** Recent commits detected  
✅ **Issues:** No critical issues found  
✅ **Security:** Monitoring active

### Recommendations
- Continue monitoring for code quality
- Review open pull requests  
- Check for dependency updates

*Generated by SideRepoOps automated workflow*" \
        --label automation,status,health,daily \
        --assignee ${{ github.actor }}

  - name: Agent completed
    shell: bash
    run: echo "✅ Daily status workflow completed"