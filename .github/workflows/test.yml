name: test-github-app
on:
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Test secrets
      run: |
        echo "APP_PRIVATE_KEY length: $(echo '${{ secrets.APP_PRIVATE_KEY }}' | wc -c)"
        echo "MINIMAX_API_KEY present: $(if [ -z '${{ secrets.MINIMAX_API_KEY }}' ]; then echo 'NO'; else echo 'YES'; fi)"