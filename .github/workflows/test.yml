name: test-github-app
on:
  workflow_dispatch:
permissions:
  contents: read
  issues: read
jobs:
  test:
    runs-on: ubuntu-latest
    environment: ${environment}-{context}
    steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with: node-version: 20
    - name: Test GitHub App auth
      run: |
        echo "TOKEN LENGTH: ${{ secrets.APP_PRIVATE_KEY }}"
        echo "Testing basic gh command..."
        gh --version
        echo "Token available: $(if [ -n \"${{ secrets.APP_PRIVATE_KEY }}\" ]; then echo 'YES'; else echo 'NO'; fi)"