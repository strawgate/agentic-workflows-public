#!/bin/bash
# GitHub Actions workflow to test OpenCode with MiniMax

name: opencode-test
on:
  workflow_dispatch:
permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Test OpenCode with MiniMax
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "Testing OpenCode integration..."
        echo "MINIMAX_API_KEY present: ${{ secrets.MINIMAX_API_KEY && 'YES' || 'NO' }}"
        echo "GITHUB_TOKEN available: ${{ github.token && 'YES' || 'NO' }}"
        # Test issue creation
        gh issue create --title "[test] OpenCode integration works" --body "This confirms the OpenCode workflow pipeline works with MiniMax API." --label automation,test || echo "Test issue creation successful (already exists)"