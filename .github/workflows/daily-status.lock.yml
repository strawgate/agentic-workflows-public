name: daily-status
on:
  schedule:
    - cron: '0 2 * * 1-5'  # Weekdays 2AM UTC
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated list of target repos'
        required: false
        default: 'strawgate/agentic-workflows'
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated list of target repos'
        required: false
        default: 'strawgate/agentics'

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  run-daily-status:
    runs-on: ubuntu-latest
    environment: ${environment}-{context}
    concurrency:
      group: gh-aw-${{ github.workflow }}
    steps:
    - name: Checkout workspace
      uses: actions/checkout@v4
      with: repo-token: ${{ github.token }}
      if-no-files-found: error
  - id: inputs
    name: Setup OpenCode
    uses: ./.actions/setup
  - id: agent
    name: Run OpenCode agent
    uses: ./.actions/agent
    with:
        engine: opencode
        engine-model: claude-3-5-sonnet-20241022
        inputs: '${{ steps.inputs.outputs.inputs }}'
        context: ${{ steps.inputs.outputs.context }}
        repository: ${{ github.repository }}
        task: ${{ github.event.inputs.task || 'Create a daily status report for this repository' }}
  - id: safe-output
    name: Execute safe outputs
    uses: ./.actions/output
    if: success() || failure()
    with:
        repo-token: ${{ github.token }}
        github-app-client-id: ${{ vars.APP_ID }}
        github-app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
        github-app-owner: strawgate-llc
        github-app-repositories: agentic-workflows